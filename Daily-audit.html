<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Floor — Documentation Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f0ede8; --surface:#faf8f5; --w:#fff;
  --border:#ddd9d2; --text:#1a1816; --muted:#7a746c;
  --accent:#2d6a4f; --accent2:#e8f5ee;
  --done:#2d6a4f;    --done-bg:#e8f5ee;
  --nd:#c0392b;      --nd-bg:#fdecea;
  --inc:#b7670a;     --inc-bg:#fef3e2;
  --na:#5a6a7a;      --na-bg:#eef0f3;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;}

/* ── HEADER ── */
.hdr{background:var(--accent);color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,.15);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
.hdr h1{font-size:1.15rem;font-weight:700;letter-spacing:-.2px;}
.hdr-sub{font-size:.7rem;opacity:.7;margin-top:2px;font-family:'DM Mono',monospace;}
.prog-wrap{background:rgba(255,255,255,.2);border-radius:99px;height:4px;margin-top:10px;overflow:hidden;}
.prog-bar{height:100%;background:#74d6a4;border-radius:99px;transition:width .4s;}
.prog-lbl{font-size:.65rem;font-family:'DM Mono',monospace;opacity:.72;margin-top:4px;}

/* ── TABS ── */
.tabs{display:flex;background:var(--w);border-bottom:1.5px solid var(--border);}
.tab{flex:1;padding:11px 6px;border:none;background:none;font-family:'DM Sans',sans-serif;
  font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── PATIENT FORM ── */
.pbar{background:var(--w);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.pf{display:flex;flex-direction:column;gap:3px;}
.pf label{font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.pf input,.pf select{border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;
  font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--text);background:var(--bg);
  outline:none;transition:border-color .2s;min-width:120px;}
.pf input:focus,.pf select:focus{border-color:var(--accent);}
.save-visit-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;align-self:flex-end;transition:background .15s;}
.save-visit-btn:hover{background:#245a42;}

/* ── CHECKLIST ── */
.cl-wrap{max-width:700px;margin:16px auto;padding:0 12px;}
.sec-title{font-size:.64rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:22px 0 6px;padding-left:3px;}
.cl-item{background:var(--w);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:box-shadow .2s;}
.cl-item:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}
.cl-item.s-done      {border-left:4px solid var(--done);}
.cl-item.s-notdone   {border-left:4px solid var(--nd);}
.cl-item.s-incomplete{border-left:4px solid var(--inc);}
.cl-item.s-na        {border-left:4px solid var(--na);}
.irow{display:flex;align-items:center;padding:10px 10px;gap:7px;}
.inum{font-size:.66rem;font-family:'DM Mono',monospace;color:var(--muted);width:18px;flex-shrink:0;}
.iname{flex:1;font-size:.86rem;font-weight:500;}
.sgrp{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;}
.sbtn{padding:4px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:.67rem;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;background:none;color:var(--muted);transition:all .15s;white-space:nowrap;}
.sbtn.done.on      {background:var(--done-bg);border-color:var(--done);color:var(--done);}
.sbtn.notdone.on   {background:var(--nd-bg);border-color:var(--nd);color:var(--nd);}
.sbtn.incomplete.on{background:var(--inc-bg);border-color:var(--inc);color:var(--inc);}
.sbtn.na.on        {background:var(--na-bg);border-color:var(--na);color:var(--na);}
.ctog{background:none;border:none;font-size:.72rem;color:var(--muted);cursor:pointer;padding:2px 4px;flex-shrink:0;transition:color .15s;}
.ctog:hover,.ctog.hc{color:var(--accent);}
.crow{padding:0 10px 9px 35px;display:none;}
.crow.show{display:block;}
.crow textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;
  font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text);background:var(--bg);
  resize:vertical;min-height:48px;outline:none;transition:border-color .2s;}
.crow textarea:focus{border-color:var(--accent);}

/* ── LOG TAB ── */
.log-wrap{max-width:700px;margin:16px auto;padding:0 12px;}
.log-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem;}

.patient-card{background:var(--w);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.pc-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;background:var(--surface);}
.pc-header:hover{background:#f5f2ed;}
.pc-name{font-weight:700;font-size:.9rem;flex:1;}
.pc-meta{font-size:.72rem;color:var(--muted);}
.pc-badges{display:flex;gap:5px;flex-shrink:0;}
.badge{padding:3px 8px;border-radius:99px;font-size:.65rem;font-weight:700;}
.badge.visits{background:#e8f0fe;color:#1a56db;}
.badge.pending{background:var(--nd-bg);color:var(--nd);}
.badge.clear{background:var(--done-bg);color:var(--done);}
.pc-chevron{font-size:.8rem;color:var(--muted);transition:transform .2s;}
.pc-chevron.open{transform:rotate(90deg);}

.pc-body{display:none;border-top:1px solid var(--border);}
.pc-body.open{display:block;}

.visit-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f5f2ed;gap:8px;flex-wrap:wrap;}
.visit-date{font-size:.75rem;font-family:'DM Mono',monospace;font-weight:600;color:var(--accent);min-width:90px;}
.visit-stats{display:flex;gap:5px;flex:1;flex-wrap:wrap;}
.vs{font-size:.67rem;font-weight:600;padding:2px 7px;border-radius:5px;}
.vs.d{background:var(--done-bg);color:var(--done);}
.vs.n{background:var(--nd-bg);color:var(--nd);}
.vs.i{background:var(--inc-bg);color:var(--inc);}
.vs.a{background:var(--na-bg);color:var(--na);}
.visit-btns{display:flex;gap:5px;flex-shrink:0;}
.vbtn{padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;}
.vbtn:hover{border-color:var(--accent);color:var(--accent);}
.vbtn.del{color:var(--nd);}
.vbtn.del:hover{background:var(--nd-bg);border-color:var(--nd);}

/* ── MONTH EXPORT SECTION ── */
.export-section{max-width:700px;margin:16px auto;padding:0 12px;}
.export-card{background:var(--w);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;}
.export-card h3{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.export-card p{font-size:.78rem;color:var(--muted);margin-bottom:14px;}
.month-select-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--bg);border-radius:8px;padding:10px 12px;}
.stat-box .num{font-size:1.4rem;font-weight:700;color:var(--accent);}
.stat-box .lbl{font-size:.68rem;color:var(--muted);}

/* ── ACTION BAR ── */
.abar{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap;z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.07);}
.btn{padding:9px 17px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.81rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn-g{background:var(--accent);color:#fff;}
.btn-g:hover{background:#245a42;}
.btn-o{background:none;border:1.5px solid var(--border);color:var(--text);}
.btn-o:hover{border-color:var(--accent);color:var(--accent);}
.btn-r{background:none;border:1.5px solid #e0d5d5;color:var(--nd);}
.btn-r:hover{background:var(--nd-bg);}
.btn-b{background:#1a56db;color:#fff;}
.btn-b:hover{background:#1446b0;}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:18px;}
.mo.show{display:flex;}
.md{background:var(--w);border-radius:14px;width:100%;max-width:560px;max-height:84vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mdh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mdh h2{font-size:.97rem;font-weight:700;}
.xbtn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:2px 6px;}
.meta-card{background:var(--bg);border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:.82rem;display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;}
.meta-card span{color:var(--muted);font-size:.66rem;display:block;}
.meta-card strong{font-weight:600;}
.sdiv{font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin:12px 0 5px;}
.srow{display:flex;gap:8px;font-size:.81rem;padding:6px 3px;border-bottom:1px solid #f0ede8;align-items:baseline;flex-wrap:wrap;}
.srow .sn{flex:1;min-width:120px;}
.stag{padding:2px 7px;border-radius:5px;font-size:.65rem;font-weight:700;}
.stag.done      {background:var(--done-bg);color:var(--done);}
.stag.notdone   {background:var(--nd-bg);color:var(--nd);}
.stag.incomplete{background:var(--inc-bg);color:var(--inc);}
.stag.na        {background:var(--na-bg);color:var(--na);}
.scmt{font-size:.71rem;color:var(--muted);font-style:italic;width:100%;padding-left:3px;}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1a1816;color:#fff;padding:9px 18px;border-radius:9px;font-size:.8rem;font-weight:500;
  opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .sbtn{padding:3px 5px;font-size:.62rem;}
  .iname{font-size:.8rem;}
  .pf input,.pf select{min-width:100px;}
  .btn{padding:8px 12px;font-size:.76rem;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>🏥 Private Floor Tracker</h1>
      <div class="hdr-sub" id="dateLabel"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:1.2rem;font-weight:700" id="statsLabel">0/26</div>
      <div style="font-size:.66rem;opacity:.7">items done</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="prog-lbl" id="progLbl">Select a patient or start a new entry</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('checklist',this)">📋 Checklist</button>
  <button class="tab" onclick="switchTab('log',this)">📁 Patient Log</button>
  <button class="tab" onclick="switchTab('export',this)">📊 Monthly Export</button>
</div>

<!-- ═══ CHECKLIST TAB ═══ -->
<div id="tab-checklist">
  <div class="pbar">
    <div class="pf">
      <label>Patient Name</label>
      <input type="text" id="ptName" placeholder="Full name…">
    </div>
    <div class="pf">
      <label>MR #</label>
      <input type="text" id="ptMR" placeholder="MR number…">
    </div>
    <div class="pf">
      <label>Department</label>
      <select id="ptDept">
        <option value="">— Select —</option>
        <option>General Ward</option><option>ICU</option><option>HDU</option>
        <option>Surgical Ward</option><option>Medical Ward</option><option>Maternity</option>
        <option>Paediatrics</option><option>Orthopaedics</option><option>Cardiology</option>
        <option>Neurology</option><option>Oncology</option><option>Nephrology</option>
        <option>Private Room</option><option>Other</option>
      </select>
    </div>
    <div class="pf">
      <label>Visit Date</label>
      <input type="date" id="ptDate">
    </div>
    <button class="save-visit-btn" onclick="saveVisit()">💾 Save Visit</button>
  </div>
  <div class="cl-wrap" id="clWrap"></div>
</div>

<!-- ═══ LOG TAB ═══ -->
<div id="tab-log" style="display:none">
  <div class="log-wrap" id="logWrap"></div>
</div>

<!-- ═══ EXPORT TAB ═══ -->
<div id="tab-export" style="display:none">
  <div class="export-section">
    <div class="export-card">
      <h3>📊 Monthly Export</h3>
      <p>Choose a month to export all saved visits into a full Excel report for WPS.</p>
      <div class="month-select-row">
        <div class="pf">
          <label>Month</label>
          <select id="expMonth">
            <option value="0">January</option><option value="1">February</option>
            <option value="2">March</option><option value="3">April</option>
            <option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option>
            <option value="8">September</option><option value="9">October</option>
            <option value="10">November</option><option value="11">December</option>
          </select>
        </div>
        <div class="pf">
          <label>Year</label>
          <input type="number" id="expYear" style="min-width:90px" value="">
        </div>
      </div>
      <div class="stats-grid" id="expStats"></div>
      <button class="btn btn-b" style="width:100%" onclick="exportMonthly()">⬇ Export to Excel (.xlsx)</button>
    </div>
  </div>
</div>

<!-- ACTION BAR (checklist only) -->
<div class="abar" id="abar">
  <button class="btn btn-o" onclick="showSummary()">👁 Preview</button>
  <button class="btn btn-g" onclick="saveVisit()">💾 Save Visit</button>
  <button class="btn btn-r" onclick="clearChecklist()">🗑 Clear</button>
</div>

<!-- SUMMARY MODAL -->
<div class="mo" id="moSummary">
  <div class="md">
    <div class="mdh"><h2>Visit Summary</h2><button class="xbtn" onclick="closeMo('moSummary')">✕</button></div>
    <div id="moSummaryContent"></div>
    <button class="btn btn-g" style="margin-top:14px;width:100%" onclick="saveVisit();closeMo('moSummary')">💾 Save this Visit</button>
  </div>
</div>

<!-- VIEW VISIT MODAL -->
<div class="mo" id="moVisit">
  <div class="md">
    <div class="mdh"><h2 id="moVisitTitle">Visit Detail</h2><button class="xbtn" onclick="closeMo('moVisit')">✕</button></div>
    <div id="moVisitContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ──
const ITEMS = [
  {id:'name',         label:'Name',               group:'Patient Info'},
  {id:'vte',          label:'VTE',                group:'Clinical'},
  {id:'admOrders',    label:'Admission Orders',   group:'Clinical'},
  {id:'history',      label:'History',            group:'Clinical'},
  {id:'shiftNotes',   label:'Shifting Notes',     group:'Notes & Communication'},
  {id:'recvNotes',    label:'Receiving Notes',    group:'Notes & Communication'},
  {id:'er',           label:'ER',                 group:'Notes & Communication'},
  {id:'consents',     label:'Consents',           group:'Legal & Consents'},
  {id:'dialNotes',    label:'Dialysis Notes',     group:'Dialysis'},
  {id:'dialConsent',  label:'Dialysis Consent',   group:'Dialysis'},
  {id:'bloodNotes',   label:'Blood Notes',        group:'Blood'},
  {id:'bloodConsent', label:'Blood Consent',      group:'Blood'},
  {id:'txIn',         label:'Transfer In',        group:'Transfer'},
  {id:'txOut',        label:'Transfer Out',       group:'Transfer'},
  {id:'otNotes',      label:'OT Notes',           group:'Surgical'},
  {id:'anesthForm',   label:'Anesthesia Form',    group:'Surgical'},
  {id:'surgCheck',    label:'Surgical Checklist', group:'Surgical'},
  {id:'abbrev',       label:'Abbreviations',      group:'Surgical'},
  {id:'preOpCheck',   label:'Pre-Op Checklist',   group:'Surgical'},
  {id:'dailyNotes',   label:'Daily Notes',        group:'Daily Care'},
  {id:'dischPlan',    label:'Discharge Planning', group:'Daily Care'},
  {id:'fallRisk',     label:'Fall Risk',          group:'Daily Care'},
  {id:'preAnest',     label:'Pre-Anesthesia',     group:'Pre-Op'},
  {id:'preOp',        label:'Pre-OP',             group:'Pre-Op'},
  {id:'nutrition',    label:'Nutrition',          group:'Daily Care'},
  {id:'others',       label:'Others',             group:'Misc'},
];

const STATUS_LABEL = {done:'Done',notdone:'Not Done',incomplete:'Incomplete',na:'N/A'};

// ── STATE ──
// log: array of visit objects { id, name, mr, dept, date, items:{itemId:{status,comment}} }
let log  = JSON.parse(localStorage.getItem('pfLog_v1') || '[]');
let draft = JSON.parse(localStorage.getItem('pfDraft_v1') || '{}'); // current checklist draft

function saveLog()   { localStorage.setItem('pfLog_v1',   JSON.stringify(log));   }
function saveDraft() { localStorage.setItem('pfDraft_v1', JSON.stringify(draft)); }

// ── TABS ──
let currentTab = 'checklist';
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['checklist','log','export'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  document.getElementById('abar').style.display = tab==='checklist' ? 'flex' : 'none';
  if (tab==='log')    renderLog();
  if (tab==='export') renderExportStats();
}

// ── CHECKLIST ──
function getItem(id)  { return draft[id] || {status:null,comment:''}; }

function setStatus(id, s) {
  if (!draft[id]) draft[id] = {status:null,comment:''};
  draft[id].status = draft[id].status===s ? null : s;
  saveDraft(); renderChecklist(); updateProgress();
}
function setComment(id, v) {
  if (!draft[id]) draft[id] = {status:null,comment:''};
  draft[id].comment = v; saveDraft();
  const b = document.querySelector(`[data-ct="${id}"]`);
  if (b) b.classList.toggle('hc', !!v);
}
function toggleCmt(id) {
  const r = document.getElementById('cr-'+id);
  r.classList.toggle('show');
  if (r.classList.contains('show')) r.querySelector('textarea').focus();
}

function renderChecklist() {
  const wrap = document.getElementById('clWrap');
  const groups = {};
  ITEMS.forEach(item => { if(!groups[item.group]) groups[item.group]=[]; groups[item.group].push(item); });
  let html='', num=1;
  Object.entries(groups).forEach(([g,items]) => {
    html += `<div class="sec-title">${g}</div>`;
    items.forEach(item => {
      const d = getItem(item.id);
      const sc = d.status ? `s-${d.status}` : '';
      html += `<div class="cl-item ${sc}">
        <div class="irow">
          <span class="inum">${num}</span>
          <span class="iname">${item.label}</span>
          <div class="sgrp">
            <button class="sbtn done ${d.status==='done'?'on':''}"       onclick="setStatus('${item.id}','done')">✓ Done</button>
            <button class="sbtn notdone ${d.status==='notdone'?'on':''}" onclick="setStatus('${item.id}','notdone')">✗ Not Done</button>
            <button class="sbtn incomplete ${d.status==='incomplete'?'on':''}" onclick="setStatus('${item.id}','incomplete')">~ Incomplete</button>
            <button class="sbtn na ${d.status==='na'?'on':''}"           onclick="setStatus('${item.id}','na')">N/A</button>
          </div>
          <button class="ctog ${d.comment?'hc':''}" data-ct="${item.id}" onclick="toggleCmt('${item.id}')">💬</button>
        </div>
        <div class="crow ${d.comment?'show':''}" id="cr-${item.id}">
          <textarea placeholder="Add comment…" oninput="setComment('${item.id}',this.value)">${d.comment||''}</textarea>
        </div>
      </div>`;
      num++;
    });
  });
  wrap.innerHTML = html;
}

function updateProgress() {
  const total  = ITEMS.length;
  const filled = ITEMS.filter(i=>getItem(i.id).status).length;
  const done   = ITEMS.filter(i=>getItem(i.id).status==='done').length;
  const pct    = Math.round(filled/total*100);
  document.getElementById('progBar').style.width = pct+'%';
  document.getElementById('statsLabel').textContent = `${done}/${total}`;
  document.getElementById('progLbl').textContent = `${pct}% reviewed — ${done} done, ${filled-done} pending`;
}

function clearChecklist() {
  if (!confirm('Clear the current draft checklist?')) return;
  draft = {}; saveDraft(); renderChecklist(); updateProgress();
}

// ── SAVE VISIT ──
function saveVisit() {
  const name = document.getElementById('ptName').value.trim();
  const mr   = document.getElementById('ptMR').value.trim();
  const dept = document.getElementById('ptDept').value;
  const date = document.getElementById('ptDate').value;
  if (!name || !mr || !date) { showToast('⚠️ Please fill in Name, MR # and Date'); return; }

  const visit = {
    id: Date.now().toString(),
    name, mr, dept,
    date,
    savedAt: new Date().toISOString(),
    items: JSON.parse(JSON.stringify(draft)),
  };
  log.push(visit);
  saveLog();
  draft = {}; saveDraft();
  renderChecklist(); updateProgress();
  // clear form
  document.getElementById('ptName').value = '';
  document.getElementById('ptMR').value   = '';
  document.getElementById('ptDept').value = '';
  document.getElementById('ptDate').value = new Date().toISOString().split('T')[0];
  closeMo('moSummary');
  showToast(`✅ Visit saved for ${name} (${date})`);
}

// ── SUMMARY PREVIEW ──
function showSummary() {
  const name = document.getElementById('ptName').value || '—';
  const mr   = document.getElementById('ptMR').value   || '—';
  const dept = document.getElementById('ptDept').value || '—';
  const date = document.getElementById('ptDate').value || '—';
  const groups={};
  ITEMS.forEach(item=>{
    const d=getItem(item.id);
    if(!d.status&&!d.comment) return;
    if(!groups[item.group]) groups[item.group]=[];
    groups[item.group].push({...item,...d});
  });
  let html=`<div class="meta-card">
    <div><span>Patient</span><strong>${name}</strong></div>
    <div><span>MR #</span><strong>${mr}</strong></div>
    <div><span>Department</span><strong>${dept}</strong></div>
    <div><span>Date</span><strong>${date}</strong></div>
  </div>`;
  if(!Object.keys(groups).length) html+='<p style="color:var(--muted);font-size:.84rem;">No items marked yet.</p>';
  else Object.entries(groups).forEach(([g,items])=>{
    html+=`<div class="sdiv">${g}</div>`;
    items.forEach(item=>{
      html+=`<div class="srow">
        <span class="sn">${item.label}</span>
        ${item.status?`<span class="stag ${item.status}">${STATUS_LABEL[item.status]}</span>`:''}
        ${item.comment?`<div class="scmt">💬 ${item.comment}</div>`:''}
      </div>`;
    });
  });
  document.getElementById('moSummaryContent').innerHTML = html;
  document.getElementById('moSummary').classList.add('show');
}

// ── PATIENT LOG ──
function renderLog() {
  const wrap = document.getElementById('logWrap');
  if (!log.length) { wrap.innerHTML='<div class="log-empty">No visits saved yet.<br>Fill a checklist and tap 💾 Save Visit.</div>'; return; }

  // Group visits by MR#
  const byMR = {};
  log.forEach(v => {
    if (!byMR[v.mr]) byMR[v.mr] = {name:v.name, mr:v.mr, dept:v.dept, visits:[]};
    byMR[v.mr].visits.push(v);
  });
  // Sort visits by date within each patient
  Object.values(byMR).forEach(p => p.visits.sort((a,b)=>a.date.localeCompare(b.date)));

  let html = '';
  Object.values(byMR).forEach(pat => {
    const lastVisit = pat.visits[pat.visits.length-1];
    // Count pending items in latest visit
    const pending = ITEMS.filter(i=>{
      const s = lastVisit.items[i.id]?.status;
      return s==='notdone'||s==='incomplete';
    }).length;

    html += `<div class="patient-card">
      <div class="pc-header" onclick="togglePC('pc-${pat.mr}')">
        <div>
          <div class="pc-name">${pat.name}</div>
          <div class="pc-meta">MR# ${pat.mr} · ${pat.visits[0].dept||'—'}</div>
        </div>
        <div class="pc-badges">
          <span class="badge visits">${pat.visits.length} visit${pat.visits.length>1?'s':''}</span>
          ${pending>0?`<span class="badge pending">${pending} pending</span>`:`<span class="badge clear">✓ Clear</span>`}
        </div>
        <span class="pc-chevron" id="chev-pc-${pat.mr}">▶</span>
      </div>
      <div class="pc-body" id="pc-${pat.mr}">`;

    pat.visits.forEach(v=>{
      const cnt = s => ITEMS.filter(i=>v.items[i.id]?.status===s).length;
      html += `<div class="visit-row">
        <span class="visit-date">${v.date}</span>
        <div class="visit-stats">
          ${cnt('done')>0      ?`<span class="vs d">✓ ${cnt('done')} Done</span>`:''}
          ${cnt('notdone')>0   ?`<span class="vs n">✗ ${cnt('notdone')} Not Done</span>`:''}
          ${cnt('incomplete')>0?`<span class="vs i">~ ${cnt('incomplete')} Incomplete</span>`:''}
          ${cnt('na')>0        ?`<span class="vs a">${cnt('na')} N/A</span>`:''}
        </div>
        <div class="visit-btns">
          <button class="vbtn" onclick="viewVisit('${v.id}')">View</button>
          <button class="vbtn" onclick="editVisit('${v.id}')">Edit</button>
          <button class="vbtn del" onclick="deleteVisit('${v.id}')">Delete</button>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  wrap.innerHTML = html;
}

function togglePC(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-'+id);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function viewVisit(vid) {
  const v = log.find(x=>x.id===vid);
  if (!v) return;
  const groups={};
  ITEMS.forEach(item=>{
    const d = v.items[item.id]||{};
    if(!d.status&&!d.comment) return;
    if(!groups[item.group]) groups[item.group]=[];
    groups[item.group].push({...item,...d});
  });
  let html=`<div class="meta-card">
    <div><span>Patient</span><strong>${v.name}</strong></div>
    <div><span>MR #</span><strong>${v.mr}</strong></div>
    <div><span>Department</span><strong>${v.dept||'—'}</strong></div>
    <div><span>Date</span><strong>${v.date}</strong></div>
  </div>`;
  if(!Object.keys(groups).length) html+='<p style="color:var(--muted);font-size:.84rem;">No items were marked on this visit.</p>';
  else Object.entries(groups).forEach(([g,items])=>{
    html+=`<div class="sdiv">${g}</div>`;
    items.forEach(item=>{
      html+=`<div class="srow">
        <span class="sn">${item.label}</span>
        ${item.status?`<span class="stag ${item.status}">${STATUS_LABEL[item.status]}</span>`:''}
        ${item.comment?`<div class="scmt">💬 ${item.comment}</div>`:''}
      </div>`;
    });
  });
  document.getElementById('moVisitTitle').textContent = `${v.name} — ${v.date}`;
  document.getElementById('moVisitContent').innerHTML = html;
  document.getElementById('moVisit').classList.add('show');
}

function editVisit(vid) {
  const v = log.find(x=>x.id===vid);
  if (!v) return;
  if (!confirm(`Load visit from ${v.date} for ${v.name} into the checklist for editing?\nThis will clear your current draft.`)) return;
  draft = JSON.parse(JSON.stringify(v.items));
  saveDraft();
  document.getElementById('ptName').value = v.name;
  document.getElementById('ptMR').value   = v.mr;
  document.getElementById('ptDept').value = v.dept||'';
  document.getElementById('ptDate').value = v.date;
  // remove old visit so the re-save replaces it
  log = log.filter(x=>x.id!==vid);
  saveLog();
  renderChecklist(); updateProgress();
  switchTab('checklist', document.querySelectorAll('.tab')[0]);
  showToast('Visit loaded — make changes and tap 💾 Save Visit');
}

function deleteVisit(vid) {
  const v = log.find(x=>x.id===vid);
  if (!confirm(`Delete visit on ${v?.date} for ${v?.name}?`)) return;
  log = log.filter(x=>x.id!==vid);
  saveLog(); renderLog();
  showToast('Visit deleted');
}

// ── MONTHLY EXPORT ──
function renderExportStats() {
  const month = parseInt(document.getElementById('expMonth').value);
  const year  = parseInt(document.getElementById('expYear').value);
  const filtered = log.filter(v=>{
    const d = new Date(v.date);
    return d.getMonth()===month && d.getFullYear()===year;
  });
  const uniquePts = new Set(filtered.map(v=>v.mr)).size;
  const totalVisits = filtered.length;
  const totalPending = filtered.reduce((acc,v)=>{
    return acc + ITEMS.filter(i=>{ const s=v.items[i.id]?.status; return s==='notdone'||s==='incomplete'; }).length;
  },0);
  const totalDone = filtered.reduce((acc,v)=>{
    return acc + ITEMS.filter(i=>v.items[i.id]?.status==='done').length;
  },0);
  document.getElementById('expStats').innerHTML = `
    <div class="stat-box"><div class="num">${uniquePts}</div><div class="lbl">Patients</div></div>
    <div class="stat-box"><div class="num">${totalVisits}</div><div class="lbl">Total Visits</div></div>
    <div class="stat-box"><div class="num" style="color:var(--done)">${totalDone}</div><div class="lbl">Items Done</div></div>
    <div class="stat-box"><div class="num" style="color:var(--nd)">${totalPending}</div><div class="lbl">Items Pending</div></div>`;
}

document.addEventListener('change', e=>{
  if(e.target.id==='expMonth'||e.target.id==='expYear') renderExportStats();
});

function exportMonthly() {
  const month     = parseInt(document.getElementById('expMonth').value);
  const year      = parseInt(document.getElementById('expYear').value);
  const monthName = ['January','February','March','April','May','June','July','August','September','October','November','December'][month];
  const filtered  = log.filter(v=>{ const d=new Date(v.date); return d.getMonth()===month&&d.getFullYear()===year; });

  if (!filtered.length) { showToast(`⚠️ No visits found for ${monthName} ${year}`); return; }

  const wb = XLSX.utils.book_new();

  // ── Sheet 1: SUMMARY (one row per patient, columns = visit dates) ──
  // Get all unique dates in the month, sorted
  const allDates = [...new Set(filtered.map(v=>v.date))].sort();

  // Group by MR
  const byMR = {};
  filtered.forEach(v=>{
    if(!byMR[v.mr]) byMR[v.mr]={name:v.name,mr:v.mr,dept:v.dept,visits:{}};
    byMR[v.mr].visits[v.date] = v;
  });

  // Header rows
  const summaryAoa = [
    [`Private Floor Documentation — ${monthName} ${year}`],
    [`Generated: ${new Date().toLocaleString('en-PK')}`],
    [],
    ['Patient','MR #','Dept',...allDates,'Overall Status'],
  ];

  Object.values(byMR).forEach(pat=>{
    const row = [pat.name, pat.mr, pat.dept||'—'];
    allDates.forEach(dt=>{
      const v = pat.visits[dt];
      if (!v) { row.push('—'); return; }
      const done  = ITEMS.filter(i=>v.items[i.id]?.status==='done').length;
      const nd    = ITEMS.filter(i=>v.items[i.id]?.status==='notdone').length;
      const inc   = ITEMS.filter(i=>v.items[i.id]?.status==='incomplete').length;
      const na    = ITEMS.filter(i=>v.items[i.id]?.status==='na').length;
      row.push(`✓${done} ✗${nd} ~${inc} N/A${na}`);
    });
    // Overall: check if any item was ever incomplete/notdone and never resolved
    const latestVisit = filtered.filter(v=>v.mr===pat.mr).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const hasOpen = ITEMS.some(i=>{ const s=latestVisit.items[i.id]?.status; return s==='notdone'||s==='incomplete'; });
    row.push(hasOpen ? 'PENDING' : 'COMPLETE');
    summaryAoa.push(row);
  });

  const ws1 = XLSX.utils.aoa_to_sheet(summaryAoa);
  ws1['!merges'] = [{s:{r:0,c:0},e:{r:0,c:3+allDates.length}}];
  const sumCols = [{wch:22},{wch:12},{wch:16},...allDates.map(()=>({wch:20})),{wch:14}];
  ws1['!cols'] = sumCols;
  XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

  // ── Sheet 2: DETAILED (one row per item per visit) ──
  const detailAoa = [['Date','Patient','MR #','Department','#','Category','Item','Status','Comments']];
  filtered.sort((a,b)=>a.date.localeCompare(b.date)).forEach(v=>{
    ITEMS.forEach((item,i)=>{
      const d = v.items[item.id]||{};
      detailAoa.push([
        v.date, v.name, v.mr, v.dept||'—',
        i+1, item.group, item.label,
        d.status ? STATUS_LABEL[d.status] : 'Not Marked',
        d.comment||'',
      ]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(detailAoa);
  ws2['!cols'] = [{wch:12},{wch:22},{wch:12},{wch:16},{wch:4},{wch:22},{wch:26},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Detailed Log');

  // ── Sheet 3: PENDING ITEMS (only unresolved items from latest visits) ──
  const pendingAoa = [['Patient','MR #','Department','Latest Visit','Item','Category','Status','Comments']];
  Object.values(byMR).forEach(pat=>{
    const latestV = filtered.filter(v=>v.mr===pat.mr).sort((a,b)=>b.date.localeCompare(a.date))[0];
    ITEMS.forEach(item=>{
      const d = latestV.items[item.id]||{};
      if (d.status==='notdone'||d.status==='incomplete') {
        pendingAoa.push([pat.name,pat.mr,pat.dept||'—',latestV.date,item.label,item.group,STATUS_LABEL[d.status],d.comment||'']);
      }
    });
  });
  const ws3 = XLSX.utils.aoa_to_sheet(pendingAoa);
  ws3['!cols'] = [{wch:22},{wch:12},{wch:16},{wch:12},{wch:26},{wch:22},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Pending Items');

  XLSX.writeFile(wb, `PrivateFloor_${monthName}_${year}.xlsx`);
  showToast(`✅ Exported PrivateFloor_${monthName}_${year}.xlsx`);
}

// ── UTILS ──
function closeMo(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ── INIT ──
const now = new Date();
document.getElementById('dateLabel').textContent =
  now.toLocaleDateString('en-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('ptDate').value = now.toISOString().split('T')[0];
document.getElementById('expMonth').value = now.getMonth();
document.getElementById('expYear').value  = now.getFullYear();
renderChecklist();
updateProgress();
</script>
