
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Floor Tracker — Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg:#f0ede8; --surface:#faf8f5; --w:#fff;
            --border:#ddd9d2; --text:#1a1816; --muted:#7a746c;
            --accent:#2d6a4f; --done:#2d6a4f; --nd:#c0392b; --r:10px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:100px;}
        .hdr{background:var(--accent);color:#fff;padding:15px 20px;position:sticky;top:0;z-index:100;}
        .tabs{display:flex;background:var(--w);border-bottom:1px solid var(--border);}
        .tab{flex:1;padding:12px;border:none;background:none;font-weight:600;color:var(--muted);cursor:pointer;}
        .tab.active{color:var(--accent);border-bottom:3px solid var(--accent);}
        .cl-wrap, .log-wrap, .exp-wrap {max-width:700px;margin:15px auto;padding:0 12px;}
        
        /* New Backup UI */
        .settings-row {display:flex;gap:10px;margin-top:15px;}
        .btn-small {padding:6px 12px;font-size:0.7rem;border-radius:6px;cursor:pointer;border:1px solid var(--border);font-weight:700;}

        /* Reusing your existing styles... */
        .pbar {background:var(--w);padding:15px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
        .pf {display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
        .pf label {font-size:0.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
        .pf input, .pf select {padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;}
        .cl-item {background:var(--w);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;padding:10px;}
        .irow {display:flex;align-items:center;gap:10px;}
        .sbtn {padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:none;font-size:0.75rem;cursor:pointer;}
        .sbtn.on {background:var(--accent);color:white;border-color:var(--accent);}
        .abar{position:fixed;bottom:0;left:0;right:0;background:var(--w);padding:15px;display:flex;gap:10px;justify-content:center;border-top:1px solid var(--border);}
        .btn{padding:10px 20px;border-radius:10px;font-weight:700;border:none;cursor:pointer;}
        .btn-g{background:var(--accent);color:white;}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:8px 16px;border-radius:20px;opacity:0;transition:0.3s;z-index:1000;}
        .toast.show{opacity:1;}
    </style>
</head>
<body>

<div class="hdr">
    <h2>🏥 Documentation Tracker</h2>
    <p style="font-size:0.7rem;opacity:0.8" id="dateLabel"></p>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('checklist',this)">📋 Checklist</button>
    <button class="tab" onclick="switchTab('log',this)">📁 Patient Log</button>
    <button class="tab" onclick="switchTab('settings',this)">⚙️ Settings</button>
</div>

<div id="tab-checklist" class="cl-wrap">
    <div class="pbar">
        <div class="pf"><label>Patient Name</label><input type="text" id="ptName"></div>
        <div class="pf"><label>MR #</label><input type="text" id="ptMR"></div>
        <div class="pf"><label>Date</label><input type="date" id="ptDate"></div>
    </div>
    <div id="clItems"></div>
</div>

<div id="tab-log" class="log-wrap" style="display:none">
    <div id="logContent"></div>
</div>

<div id="tab-settings" class="exp-wrap" style="display:none">
    <div class="cl-item">
        <h3>💾 Data Management</h3>
        <p style="font-size:0.8rem;color:var(--muted);margin:10px 0;">Backup your data to a file or restore it after a browser reset.</p>
        <div class="settings-row">
            <button class="btn-small" onclick="downloadBackup()">📤 Download Backup (.json)</button>
            <button class="btn-small" onclick="document.getElementById('importFile').click()">📥 Restore Backup</button>
            <input type="file" id="importFile" style="display:none" onchange="importBackup(event)">
        </div>
    </div>
    <div class="cl-item" style="margin-top:20px;">
        <h3>📊 Excel Export</h3>
        <button class="btn-g" style="width:100%;margin-top:10px;" onclick="exportMonthly()">Export This Month to Excel</button>
    </div>
</div>

<div class="abar" id="checklistBar">
    <button class="btn btn-g" onclick="saveVisit()">💾 Save Visit</button>
</div>

<div class="toast" id="toast"></div>

<script>
    const ITEMS = [
        {id:'vte', label:'VTE Assessment', group:'Clinical'},
        {id:'consents', label:'Informed Consents', group:'Legal'},
        {id:'notes', label:'Daily Progress Notes', group:'Clinical'},
        {id:'discharge', label:'Discharge Summary', group:'Admin'}
    ];

    let log = JSON.parse(localStorage.getItem('pfLog_v1') || '[]');
    let draft = {};

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        ['checklist', 'log', 'settings'].forEach(t => document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none');
        document.getElementById('checklistBar').style.display = tab === 'checklist' ? 'flex' : 'none';
        if(tab === 'log') renderLog();
    }

    function renderChecklist() {
        let html = '';
        ITEMS.forEach(item => {
            const status = draft[item.id] || null;
            html += `
            <div class="cl-item">
                <div class="irow">
                    <span style="flex:1;font-weight:500;">${item.label}</span>
                    <button class="sbtn ${status==='done'?'on':''}" onclick="setStatus('${item.id}','done')">Done</button>
                    <button class="sbtn ${status==='na'?'on':''}" onclick="setStatus('${item.id}','na')">N/A</button>
                </div>
            </div>`;
        });
        document.getElementById('clItems').innerHTML = html;
    }

    function setStatus(id, s) {
        draft[id] = (draft[id] === s) ? null : s;
        renderChecklist();
    }

    function saveVisit() {
        const name = document.getElementById('ptName').value;
        const mr = document.getElementById('ptMR').value;
        if(!name || !mr) return showToast('⚠️ Name & MR# Required');
        
        log.push({ name, mr, date: document.getElementById('ptDate').value, items: {...draft}, id: Date.now() });
        localStorage.setItem('pfLog_v1', JSON.stringify(log));
        draft = {};
        document.getElementById('ptName').value = '';
        document.getElementById('ptMR').value = '';
        renderChecklist();
        showToast('✅ Visit Saved to Phone');
    }

    function renderLog() {
        let html = log.length ? '' : '<p style="text-align:center;color:var(--muted)">No records found.</p>';
        log.slice().reverse().forEach(entry => {
            html += `<div class="cl-item"><strong>${entry.name}</strong> (${entry.date})<br><small>MR: ${entry.mr}</small></div>`;
        });
        document.getElementById('logContent').innerHTML = html;
    }

    // BACKUP & RESTORE LOGIC
    function downloadBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(log));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `PF_Backup_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importBackup(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if(confirm(`Restore ${importedData.length} records? This will merge with your current data.`)) {
                    log = [...log, ...importedData];
                    localStorage.setItem('pfLog_v1', JSON.stringify(log));
                    showToast('✅ Data Restored');
                    renderLog();
                }
            } catch(err) { showToast('❌ Invalid File'); }
        };
        reader.readAsText(event.target.files[0]);
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('dateLabel').textContent = new Date().toDateString();
    document.getElementById('ptDate').value = new Date().toISOString().split('T')[0];
    renderChecklist();
</script>
</body>
</html>
